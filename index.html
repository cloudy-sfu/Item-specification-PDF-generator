<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Inventory Count</title>
  <!-- Bootstrap 5.3 Library -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- html2pdf Library for direct PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    /* Prevent traditional page scrolling */
    body, html {
      margin: 0;
      padding: 0;
      height: 100dvh;
      overflow: hidden; 
    }
    
    @media screen {
      .screen-hide {
        display: none !important;
      }
    }
    
    /* "Add" editing zone styling */
    .add-zone {
      background-color: #f8f9fa;
      border-radius: 1rem;
      position: relative;
      transition: background-color 0.2s;
    }
    .add-zone:hover {
      background-color: #e9ecef;
    }
    .add-zone::after {
      content: '';
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      bottom: 15px;
      border: 3px dashed #adb5bd; /* dashed darker grey lines close to the edge */
      border-radius: 0.5rem;
      pointer-events: none;
    }
    
    /* Inner table styling */
    .attribute-table th {
      font-size: 0.85rem;
      color: #6c757d;
    }
    .attribute-table td {
      padding: 0 !important;
    }
    .attribute-table input {
      border-radius: 0;
    }
    .attribute-table input:focus {
      box-shadow: none;
      outline: 2px solid #0d6efd;
      outline-offset: -2px;
      z-index: 1;
      position: relative;
    }

    /* Print Specific Styling */
    @media print {
      @page {
        size: A4 landscape;
        margin: 0;
      }
      body, html {
        height: auto !important;
        overflow: visible !important;
      }
      .print-hide, #pagination-container {
        display: none !important;
      }
      .editing-zone {
        display: none !important; /* Hide the whole last row editing zone */
      }
      .container-fluid {
        height: auto !important;
        display: block !important;
      }
      #inventory-container {
        display: block !important;
        height: auto !important;
        overflow: visible !important;
      }
      /* Ensure inner row retains 9-col / 3-col aspect in print without outer borders */
      .inventory-row {
        display: flex !important;
        height: 100vh !important;
        page-break-inside: avoid;
        page-break-after: always;
        margin-bottom: 0 !important;
        align-items: center !important;
        flex-wrap: nowrap !important;
      }
      .col-8 {
        width: 75% !important;
        flex: 0 0 75% !important;
        max-width: 75% !important;
        padding-right: 20px !important;
      }
      .col-4 {
        width: 25% !important;
        flex: 0 0 25% !important;
        max-width: 25% !important;
        border-left: none !important; /* No outer borders */
      }
      .image-container {
        height: 350px !important;
        width: 100% !important;
      }
      /* Clean up inputs to look like raw text for printing */
      .form-control {
        border: none !important;
        background: transparent !important;
        padding: 0.25rem 0.5rem !important;
        color: black !important;
      }
      .table-bordered {
        border-color: #000 !important;
      }
      .table-bordered th, .table-bordered td {
        border-color: #000 !important;
      }
    }
  </style>
</head>
<body class="overflow-hidden m-0 p-0 bg-white">
  <!-- Container Layout -->
  <div class="container-fluid d-flex flex-column h-100 p-0">
    <div id="inventory-container" class="flex-grow-1 d-flex flex-column" style="min-height: 0; overflow: hidden;">
      <!-- Inventory rows dynamically injected here -->
    </div>
    
    <!-- Page Turner / Controls -->
    <div id="pagination-container" class="d-flex justify-content-between align-items-center p-3 bg-light border-top print-hide">
      <div>
        <button class="btn btn-outline-primary shadow-sm" onclick="prevPage()" id="btn-prev">&laquo; Previous</button>
      </div>
      <div class="fw-bold fs-5 text-secondary" id="page-indicator">1 / 1</div>
      <div>
        <button class="btn btn-outline-primary shadow-sm me-2" onclick="nextPage()" id="btn-next">Next &raquo;</button>
        <button class="btn btn-outline-danger shadow-sm me-2" onclick="deleteCurrentItem()" id="btn-delete" style="display: none;">Delete</button>
        <button class="btn btn-primary shadow-sm me-2" onclick="confirmDraft()" id="btn-confirm" style="display: none;">Confirm</button>
        <button class="btn btn-success shadow-sm" onclick="generatePDF()" id="btn-print">Print</button>
      </div>
    </div>
  </div>

  <script>
    // State management
    let inventoryItems = [];
    let currentDraftImage = null;
    
    // Initial Draft Template
    let currentDraftAttributes = [
      { name: "width", value: "", unit: "cm" },
      { name: "height", value: "", unit: "cm" },
      { name: "depth", value: "", unit: "cm" }
    ];
    let currentPage = 0;

    function init() {
      render();
    }

    function render() {
      const container = document.getElementById('inventory-container');
      container.innerHTML = ''; // Full redraw structure; local input changes won't trigger full re-render to avoid losing focus
      
      // 1. Render all finalized items
      inventoryItems.forEach((item, index) => {
        container.appendChild(createRowElement(item, index, false));
      });
      
      // 2. Render the "Add" editing zone as the final row
      const draftItem = {
        isDraft: true,
        image: null,
        attributes: currentDraftAttributes
      };
      container.appendChild(createRowElement(draftItem, inventoryItems.length, true));
      
      updatePagination();
    }

    // Creates the 9-col vs 3-col layout for either a draft or a finished item
    function createRowElement(item, index, isDraft) {
      const isActive = index === currentPage;
      
      const row = document.createElement('div');
      row.className = `inventory-row row g-0 flex-grow-1 w-100 ${isActive ? '' : 'screen-hide'} ${isDraft ? 'editing-zone' : ''}`;
      row.dataset.index = index;
      row.style.minHeight = '0';
      
      // --- Left Col (8-col layout / 6-col on mobile) ---
      const leftCol = document.createElement('div');
      leftCol.className = 'col-6 col-md-8 p-3 d-flex flex-column justify-content-center align-items-center';
      leftCol.style.minHeight = '0';
      
      const label = document.createElement('label');
      label.style.cursor = 'pointer';
      label.className = 'image-container d-flex justify-content-center align-items-center m-0 w-100 h-100 ' + (isDraft && !currentDraftImage ? 'add-zone' : '');
      
      if (isDraft && !currentDraftImage) {
        label.innerHTML = `<span class="fs-1 text-secondary fw-bold" style="z-index: 1;">Add</span>`;
      } else if (isDraft && currentDraftImage) {
        label.innerHTML = `<img src="${currentDraftImage}" style="width: 100%; height: 100%; object-fit: contain;">`;
      } else {
        // Image shrinks to fit via object-fit
        label.innerHTML = `<img src="${item.image}" style="width: 100%; height: 100%; object-fit: contain;">`;
      }
      
      // Triggers native Apple/Android camera/library menus
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';
      fileInput.className = 'd-none';
      fileInput.onchange = (e) => handleImageUpload(e, index, isDraft);
      
      label.appendChild(fileInput);
      leftCol.appendChild(label);
      
      // --- Right Col (4-col layout / 6-col on mobile) ---
      const rightCol = document.createElement('div');
      rightCol.className = 'col-6 col-md-4 p-3 d-flex flex-column border-start';
      rightCol.style.minHeight = '0';
      
      const tableContainer = document.createElement('div');
      tableContainer.className = 'flex-grow-1';
      tableContainer.style.overflowY = 'auto'; // Ensures long attribute list is scrollable inside the column

      const table = document.createElement('table');
      table.className = 'table table-bordered attribute-table mb-0 table-sm';
      
      const thead = document.createElement('thead');
      thead.className = 'print-hide table-light';
      thead.innerHTML = `
        <tr>
          <th style="width: 38%">Name</th>
          <th style="width: 38%">Value</th>
          <th style="width: 14%">Unit</th>
          <th class="print-hide text-center" style="width: 10%"></th>
        </tr>
      `;
      table.appendChild(thead);
      
      const tbody = document.createElement('tbody');
      
      item.attributes.forEach((attr, attrIndex) => {
        const tr = document.createElement('tr');
        
        const createInputCell = (value, field, alignmentClass = '') => {
          const td = document.createElement('td');
          td.className = 'p-0 align-middle';
          const input = document.createElement('input');
          input.type = 'text';
          input.className = `form-control border-0 bg-transparent rounded-0 shadow-none ${alignmentClass}`;
          input.value = value;
          // Soft update state directly; bypass full redraw so user doesn't lose text focus
          input.oninput = (e) => updateAttribute(index, attrIndex, field, e.target.value, isDraft);
          td.appendChild(input);
          return td;
        };

        tr.appendChild(createInputCell(attr.name, 'name'));
        tr.appendChild(createInputCell(attr.value, 'value', 'text-center'));
        tr.appendChild(createInputCell(attr.unit, 'unit', 'text-center px-1'));
        
        // Remove Action
        const tdAct = document.createElement('td');
        tdAct.className = 'p-0 text-center print-hide align-middle';
        const btnAct = document.createElement('button');
        btnAct.className = 'btn btn-sm text-danger p-0 m-0 border-0 bg-transparent';
        btnAct.innerHTML = '<span class="fs-5 lh-1">&times;</span>';
        btnAct.onclick = () => removeAttribute(index, attrIndex, isDraft);
        tdAct.appendChild(btnAct);
        tr.appendChild(tdAct);
        
        tbody.appendChild(tr);
      });
      
      table.appendChild(tbody);
      tableContainer.appendChild(table);
      rightCol.appendChild(tableContainer);
      
      const addBtn = document.createElement('button');
      addBtn.className = 'btn btn-outline-secondary w-100 print-hide mt-3';
      addBtn.textContent = '+ Add Attribute';
      addBtn.onclick = () => addAttributeRow(index, isDraft);
      rightCol.appendChild(addBtn);
      
      row.appendChild(leftCol);
      row.appendChild(rightCol);
      
      return row;
    }

    // --- State Handlers ---

    function updateAttribute(itemIndex, attrIndex, field, value, isDraft) {
      if (isDraft) {
        currentDraftAttributes[attrIndex][field] = value;
      } else {
        inventoryItems[itemIndex].attributes[attrIndex][field] = value;
      }
    }

    function removeAttribute(itemIndex, attrIndex, isDraft) {
      if (isDraft) {
        currentDraftAttributes.splice(attrIndex, 1);
      } else {
        inventoryItems[itemIndex].attributes.splice(attrIndex, 1);
      }
      render(); // Structural DOM change requires redraw
    }

    function deleteCurrentItem() {
      if (confirm('Are you sure you want to delete this entire item?')) {
        inventoryItems.splice(currentPage, 1);
        // Adjust pagination if we deleted the current page or a page before it
        if (currentPage >= inventoryItems.length && currentPage > 0) {
          currentPage--;
        }
        render();
      }
    }

    function addAttributeRow(itemIndex, isDraft) {
      if (isDraft) {
        currentDraftAttributes.push({ name: '', value: '', unit: '' });
      } else {
        inventoryItems[itemIndex].attributes.push({ name: '', value: '', unit: '' });
      }
      render(); // Structural DOM change requires redraw
    }

    function handleImageUpload(e, index, isDraft) {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(event) {
        const dataUrl = event.target.result;
        
        if (isDraft) {
          currentDraftImage = dataUrl;
          render(); // Show the uploaded image as a draft, await confirmation
        } else {
          // Replace image on a previously created item
          inventoryItems[index].image = dataUrl;
          render();
        }
      };
      reader.readAsDataURL(file);
      e.target.value = ''; // Reset input to allow triggering same file upload again
    }

    function confirmDraft() {
      if (!currentDraftImage) return;

      // Lock in the draft as a confirmed inventory item
      const newItem = {
        image: currentDraftImage,
        attributes: currentDraftAttributes.map(a => ({...a})) // deep copy
      };
      inventoryItems.push(newItem);
      
      // Setup template for next item: keep latest variable names & units, but clear the values
      currentDraftAttributes = currentDraftAttributes.map(a => ({
        name: a.name,
        value: '',
        unit: a.unit
      }));
      currentDraftImage = null;
      
      // Automatically navigate to the new editing zone (which is now at the end)
      currentPage = inventoryItems.length;
      render();
    }

    // --- Pagination / View Handlers ---

    function updatePagination() {
      const totalPages = inventoryItems.length + 1;
      const isDraftPage = currentPage === totalPages - 1;

      document.getElementById('page-indicator').textContent = `Item ${currentPage + 1} of ${totalPages}`;
      document.getElementById('btn-prev').disabled = currentPage === 0;
      document.getElementById('btn-next').disabled = currentPage === totalPages - 1;

      // Toggle Delete Item visibility on bottom bar
      const deleteBtn = document.getElementById('btn-delete');
      if (isDraftPage) {
        deleteBtn.style.display = 'none';
      } else {
        deleteBtn.style.display = 'inline-block';
      }

      // Toggle Confirm button visibility on bottom bar
      const confirmBtn = document.getElementById('btn-confirm');
      if (isDraftPage && currentDraftImage) {
        confirmBtn.style.display = 'inline-block';
      } else {
        confirmBtn.style.display = 'none';
      }
    }

    function prevPage() {
      if (currentPage > 0) {
        currentPage--;
        updateVisibility();
        updatePagination();
      }
    }

    function nextPage() {
      const totalPages = inventoryItems.length + 1;
      if (currentPage < totalPages - 1) {
        currentPage++;
        updateVisibility();
        updatePagination();
      }
    }

    function updateVisibility() {
      // Toggle `.screen-hide` instead of re-rendering DOM so user doesn't lose form focus
      const rows = document.querySelectorAll('.inventory-row');
      rows.forEach((row, index) => {
        if (index === currentPage) {
          row.classList.remove('screen-hide');
        } else {
          row.classList.add('screen-hide');
        }
      });
    }

    function generatePDF() {
      if (inventoryItems.length === 0) {
        alert("No confirmed items to print. Please add and confirm an item first.");
        return;
      }

      const btn = document.getElementById('btn-print');
      const originalText = btn.innerHTML;
      btn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Generating...`;
      btn.disabled = true;

      const pdfContainer = document.createElement('div');
      
      inventoryItems.forEach((item, index) => {
        const page = document.createElement('div');
        page.style.pageBreakAfter = 'always';
        page.style.position = 'relative';
        
        page.innerHTML = `
          <div style="position: absolute; bottom: 20px; right: 30px; font-family: sans-serif; font-size: 16px; font-weight: bold;">
            ${index + 1} / ${inventoryItems.length}
          </div>
          <div style="display: flex; width: 100%; height: 680px; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box;">
            <div style="width: 65%; height: 100%; display: flex; align-items: center; justify-content: center; padding-right: 30px;">
              <img src="${item.image}" style="max-width: 100%; max-height: 100%; object-fit: contain;">
            </div>
            <div style="width: 35%; height: 100%; display: flex; flex-direction: column; justify-content: center;">
              <table style="width: 100%; border-collapse: collapse; font-family: sans-serif; font-size: 16px;">
                <tbody>
                  ${item.attributes.map(attr => `
                    <tr>
                      <td style="border: 1px solid #000; padding: 12px; width: 40%; font-weight: bold;">${attr.name}</td>
                      <td style="border: 1px solid #000; padding: 12px; width: 40%; text-align: center;">${attr.value}</td>
                      <td style="border: 1px solid #000; padding: 12px; width: 20%; text-align: center; color: #555;">${attr.unit}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;
        pdfContainer.appendChild(page);
      });

      const now = new Date();
      const pad = (num, size = 2) => String(num).padStart(size, '0');
      const timestamp = `${now.getFullYear()}_${pad(now.getMonth() + 1)}_${pad(now.getDate())}_${pad(now.getHours())}_${pad(now.getMinutes())}_${pad(now.getSeconds())}_${pad(now.getMilliseconds(), 3)}`;

      const opt = {
        margin:       0.2,
        filename:     `Inventory_${timestamp}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true },
        jsPDF:        { unit: 'in', format: 'a4', orientation: 'landscape' }
      };

      html2pdf().set(opt).from(pdfContainer).save().then(() => {
        btn.innerHTML = originalText;
        btn.disabled = false;
      });
    }

    // Bind Ctrl+P / Cmd+P locally (safeguard capture)
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
        e.preventDefault();
        generatePDF();
      }
    });

    // Boot
    window.onload = init;
  </script>
</body>
</html>
